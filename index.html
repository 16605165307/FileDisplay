<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰州职业技术学院 · 教学成果奖申报</title>
    <style>
        /* ============================================
           泰州职业技术学院 · 教学成果奖申报网站
           配色：深蓝 #1a3a6e 导航 #2b5aa0
           ============================================ */

        /* ---------- 基础重置 ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        [hidden] { display: none !important; }

        :root {
            --color-header: #163c70;
            --color-nav: #2859a3;
            --color-nav-hover: #3a72c4;
            --color-sidebar-bg: #f7f7f7;
            --color-sidebar-border: #e2e2e2;
            --color-sidebar-active: #eef3fa;
            --color-sidebar-active-border: #2859a3;
            --color-text-main: #333333;
            --color-text-secondary: #666666;
            --color-text-light: #999999;
            --color-link: #2859a3;
            --color-footer: #2d2d2d;
            --color-footer-text: #cccccc;

            --font-base: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            --width-max: 1200px;
        }

        body {
            font-family: var(--font-base);
            font-size: 14px;
            color: var(--color-text-main);
            background: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        html {
            overflow-y: auto;
        }

        a { color: var(--color-link); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ========== 顶部横幅区 ========== */
        .site-header {
            background: var(--color-header);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .site-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .site-logo img { height: 64px; width: auto; display: block; }

        .header-divider {
            width: 2px; height: 44px;
            background: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        .header-titles {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .header-subtitle {
            font-size: 13px; color: rgba(255,255,255,0.7);
            letter-spacing: 2px; font-weight: 400; margin: 0;
        }

        .header-title {
            font-size: 22px; color: #ffffff; font-weight: 700;
            letter-spacing: 2px; margin: 0;
            min-height: 30px;
        }

        /* 上传管理操作按钮区 */
        .header-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .header-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: background 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.28); }
        .header-btn.primary {
            background: #ffd54f;
            color: #163c70;
            border-color: #ffd54f;
            font-weight: 600;
        }
        .header-btn.primary:hover { background: #ffca28; }

        /* ========== 主导航栏 ========== */
        .main-nav { background: var(--color-nav); }
        .nav-inner {
            max-width: var(--width-max); margin: 0 auto;
            display: flex; justify-content: center;
        }
        .nav-item {
            color: #ffffff; font-size: 16px; padding: 14px 36px;
            transition: background 0.2s; position: relative; cursor: pointer; white-space: nowrap;
        }
        .nav-item:hover { background: var(--color-nav-hover); text-decoration: none; }
        .nav-item.active::after {
            content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 32px; height: 3px; background: #ffd54f;
        }

        /* ========== 主体布局 ========== */
        .page-body {
            max-width: var(--width-max); margin: 0 auto;
            display: flex; gap: 16px; padding: 18px 20px;
            /* 关键：让页面主体不撑高，由视口控制 */
            min-height: 0;
        }

        /* ========== 左侧菜单 ========== */
        .sidebar { width: 200px; flex-shrink: 0; align-self: stretch; }
        .sidebar-menu {
            background: var(--color-sidebar-bg); border: 1px solid var(--color-sidebar-border);
            border-top: 3px solid var(--color-nav); height: 100%;
        }
        .sidebar-item {
            display: block; padding: 12px 18px 12px 26px; font-size: 14px;
            color: var(--color-text-secondary); border-bottom: 1px solid var(--color-sidebar-border);
            position: relative; transition: all 0.15s; cursor: pointer;
        }
        .sidebar-item::before {
            content: ""; position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%) rotate(45deg) scale(0.55);
            width: 8px; height: 8px; border: 1.5px solid #aaa; background: transparent; transition: all 0.15s;
        }
        .sidebar-item:hover { color: var(--color-nav); background: #f0f5fc; }
        .sidebar-item.active {
            color: var(--color-nav); font-weight: 600; background: var(--color-sidebar-active);
            border-left: 3px solid var(--color-sidebar-active-border); padding-left: 23px;
        }
        .sidebar-item.active::before { border-color: var(--color-nav); background: var(--color-nav); }

        /* ========== 主内容区（关键：固定高度 + 内部滚动）========== */
        .main-content {
            flex: 1; min-width: 0;
            display: flex;
            flex-direction: column;
            /* 用 calc 计算可用高度：视口高度 - 顶栏 - 导航栏 - padding */
            height: calc(100vh - 120px - 48px - 36px);
            min-height: 500px;
        }

        /* 文档查看器容器：占满 main-content，内部滚动 */
        .doc-viewer {
            border: 1px solid #ccc; background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
            flex: 1; /* 撑满父容器 */
            min-height: 0; /* 允许收缩 */
            overflow: hidden;
        }

        /* 工具栏固定在顶部 */
        .doc-toolbar {
            background: linear-gradient(180deg, #e8e8e8, #d6d6d6);
            border-bottom: 1px solid #b0b0b0;
            padding: 8px 14px; display: flex; align-items: center; gap: 8px;
            user-select: none; flex-shrink: 0; z-index: 2;
        }

        .toolbar-btn {
            width: 28px; height: 28px; border: 1px solid #bbb; background: #fff;
            border-radius: 3px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 14px; color: #444; cursor: pointer; transition: background 0.15s; flex-shrink: 0;
        }
        .toolbar-btn:hover { background: #eee; }
        .toolbar-btn:active { background: #ddd; }
        .toolbar-btn.disabled { opacity: 0.35; cursor: not-allowed; }
        .toolbar-divider { width: 1px; height: 22px; background: #bbb; flex-shrink: 0; }
        .toolbar-page-info { font-size: 13px; color: #444; margin: 0 6px; white-space: nowrap; }
        .toolbar-spacer { flex: 1; }
        .toolbar-label { font-size: 12px; color: #666; margin-right: 4px; white-space: nowrap; }
        .toolbar-select {
            padding: 3px 22px 3px 8px; border: 1px solid #bbb; border-radius: 3px;
            font-size: 13px; appearance: none; white-space: nowrap;
            background: #fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2'><path d='m6 9 6 6 6-6'/></svg>") no-repeat right 6px center;
        }

        /* ===== 文档内容区：可滚动区域 ===== */
        .doc-scroll-wrap {
            flex: 1;
            overflow-y: auto;   /* 纵向滚动 */
            overflow-x: hidden; /* 禁止横向滚动 */
            background: #f0f0f0;
            position: relative;
            min-height: 0;
            /* 自定义滚动条样式，类似参考网站 */
            scrollbar-width: thin;
            scrollbar-color: #aaa transparent;
        }

        /* WebKit 滚动条美化 */
        .doc-scroll-wrap::-webkit-scrollbar {
            width: 10px;
        }
        .doc-scroll-wrap::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-left: 1px solid #ddd;
        }
        .doc-scroll-wrap::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 5px;
            border: 2px solid #f0f0f0;
        }
        .doc-scroll-wrap::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* 文档页面纸张 */
        .doc-page {
            background: #ffffff;
            padding: 48px 60px;
            margin: 16px auto;
            max-width: 1400px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.12);
            min-height: 900px; /* A4纸比例感 */
            /* 翻页过渡动画 */
            transition: opacity 0.25s ease, transform 0.25s ease;
            opacity: 1;
        }

        /* 翻页提示条（滚轮触发翻页时短暂显示） */
        .page-switch-hint {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 89, 163, 0.92);
            color: #fff;
            padding: 6px 18px;
            border-radius: 18px;
            font-size: 13px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        .page-switch-hint.show { opacity: 1; }
        .page-switch-hint.top { top: 12px; }
        .page-switch-hint.bottom { bottom: 12px; }

        .doc-page-inner { max-width: 720px; margin: 0 auto; }

        /* ===== 目录页样式 ===== */
        .toc-header {
            text-align: center; font-size: 22px; font-weight: 600;
            color: #222; margin-bottom: 38px; letter-spacing: 2px;
            padding-bottom: 16px; border-bottom: 2px solid #222;
        }
        .toc-list { counter-reset: toc-counter 0; }
        .toc-entry {
            display: flex; align-items: baseline; padding: 7px 0;
            font-size: 14.5px; line-height: 1.8; border-bottom: 1px dotted #ccc;
        }
        .toc-num { flex-shrink: 0; width: 42px; color: #333; font-weight: 500; }
        .toc-name { flex: 1; color: #222; cursor: pointer; }
        .toc-name:hover { color: var(--color-nav); text-decoration: underline; }
        .toc-dots {
            flex: 1; border-bottom: 1px dotted #999; margin: 0 8px; position: relative; top: -4px;
        }
        .toc-page-num { flex-shrink: 0; width: 36px; text-align: right; color: #333; }
        .toc-sub { padding-left: 28px; }

        /* ===== 内容页文档样式 ===== */
        .page-title {
            text-align: center; font-size: 20px; font-weight: 600; color: #222;
            margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #222; letter-spacing: 1px;
        }
        .doc-table {
            width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px;
        }
        .doc-table th, .doc-table td {
            border: 1px solid #333; padding: 8px 12px; vertical-align: top;
        }
        .doc-table th {
            background: #f5f5f5; font-weight: 600; text-align: center; width: 140px;
        }
        .doc-para {
            text-indent: 2em; line-height: 1.85; font-size: 14.5px; margin-bottom: 12px;
            text-align: justify; color: #222;
        }
        .doc-signature {
            text-align: right; margin-top: 40px; font-style: italic;
            font-family: "KaiTi", "楷体", serif; font-size: 17px;
        }
        .doc-date { text-align: right; margin-top: 8px; font-size: 14px; color: #555; }

        /* ===== mammoth 渲染的 Word 文档内容样式 ===== */
        .secheading { margin: 0.8em 0 0.4em; line-height: 1.4; }
        h1.secheading { font-size: 22px; color: #111; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        h2.secheading { font-size: 18px; color: #222; }
        h3.secheading { font-size: 16px; color: #333; }
        h4.secheading { font-size: 15px; color: #444; }
        h1.doctitle { text-align: center; font-size: 24px; margin: 20px 0 16px; color: #000; }
        h2.docsubtitle { text-align: center; font-size: 18px; color: #444; margin-bottom: 20px; }
        p.docpara { text-indent: 2em; line-height: 1.85; margin-bottom: 0.8em; font-size: 14px; color: #222; }
        p.doclist { text-indent: 1em; margin-bottom: 0.5em; font-size: 14px; }
        p.tableheading { font-weight: bold; text-align: center; font-size: 14px; margin-bottom: 4px; }
        /* mammoth 生成的表格容器：允许横向滚动 */
        .doc-page-inner {
            overflow-x: auto;
        }
        /* mammoth 生成的表格 */
        .doc-page-inner table {
            border-collapse: collapse; width: 100%; margin: 12px 0;
            font-size: 13px; min-width: 600px;
        }
        .doc-page-inner table td, .doc-page-inner table th {
            border: 1px solid #333; padding: 6px 10px; vertical-align: top;
        }
        .doc-page-inner table th { background: #f0f0f0; font-weight: 600; text-align: center; }
        /* mammoth 生成的图片：自适应宽度，点击可查看原图 */
        .doc-page-inner img {
            max-width: 100%; height: auto; cursor: zoom-in;
            display: block; margin: 8px auto;
        }
        .doc-page-inner img:hover { outline: 2px solid var(--color-nav); outline-offset: 2px; }

        /* 分页组件 */
        .pagination-bar {
            padding: 12px 0 16px; display: flex; justify-content: center; gap: 6px;
            flex-shrink: 0; background: #fff; border-top: 1px solid #eee;
        }
        .page-btn {
            min-width: 34px; height: 34px; padding: 0 11px; border: 1px solid #d0d0d0;
            border-radius: 3px; background: #fff; color: #555; font-size: 14px;
            cursor: pointer; transition: all 0.15s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--color-nav); color: var(--color-nav); }
        .page-btn.active { background: var(--color-nav); color: #fff; border-color: var(--color-nav); }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-info {
            display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; margin-left: 10px;
        }
        .page-jump input {
            width: 46px; padding: 4px 6px; border: 1px solid #d0d0d0;
            border-radius: 3px; text-align: center; font-size: 13px;
        }

        /* ========== 底部信息栏 ========== */
        .site-footer {
            background: var(--color-footer); color: var(--color-footer-text);
            padding: 28px 20px 20px; margin-top: 0; text-align: center;
            font-size: 13px; line-height: 2; flex-shrink: 0;
        }
        .footer-contact { margin-bottom: 8px; }
        .footer-copy {
            color: #999; font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 900px) {
            .site-header { padding: 16px 20px; }
            .site-logo img { height: 48px; }
            .nav-item { padding: 12px 18px; font-size: 14px; }
            .nav-inner { overflow-x: auto; justify-content: flex-start; }

            .page-body { flex-direction: column; padding: 12px 14px; }
            .sidebar { width: 100%; height: auto; }
            .sidebar-menu {
                display: flex; overflow-x: auto; border: none; background: transparent;
            }
            .sidebar-item {
                flex-shrink: 0; padding: 8px 16px; border: none;
                border-bottom: 2px solid transparent; border-left: none !important; font-size: 13px;
            }
            .sidebar-item::before { display: none; }
            .sidebar-item.active { background: transparent; border-bottom-color: var(--color-nav); border-left: none !important; }

            .main-content { height: calc(100vh - 220px); min-height: 400px; }
            .doc-page { padding: 24px 20px; margin: 8px 4px; }
            .doc-page-inner { max-width: 100%; }
        }

        @media (max-width: 520px) {
            .site-header { padding: 14px 16px; }
            .nav-item { padding: 11px 14px; font-size: 13px; }
            .doc-toolbar { padding: 6px 8px; gap: 4px; overflow-x: auto; }
            .toolbar-btn { width: 26px; height: 26px; }
            .doc-page { padding: 16px 14px; }
            .toc-header { font-size: 18px; }
            .toc-entry { font-size: 13px; }
            .toc-sub { padding-left: 18px; }
            .main-content { height: calc(100vh - 260px); }
        }

        .mobile-sidebar-toggle {
            display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99;
            width: 46px; height: 46px; border-radius: 50%;
            background: var(--color-nav); color: #fff; font-size: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
        }

        /* ========== 模态框 ========== */
        .modal {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal[hidden] { display: none !important; }
        .modal-mask {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px); animation: fadeIn 0.2s ease;
        }
        .modal-dialog {
            position: relative; background: #fff; border-radius: 8px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.2);
            width: 100%; max-width: 480px; max-height: 90vh;
            display: flex; flex-direction: column;
            animation: slideUp 0.25s ease;
        }
        .modal-dialog.modal-lg { max-width: 820px; }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid #eee;
        }
        .modal-header h3 { font-size: 17px; font-weight: 600; color: #222; }
        .modal-close {
            font-size: 22px; color: #999; width: 30px; height: 30px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            line-height: 1; cursor: pointer; background: none; border: none;
        }
        .modal-close:hover { background: #f5f5f5; color: #333; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer {
            padding: 14px 20px; border-top: 1px solid #eee;
            display: flex; justify-content: flex-end; gap: 10px; align-items: center;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 表单 */
        .form-row { margin-bottom: 14px; }
        .form-label {
            display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 500;
        }
        .form-input, .form-select {
            width: 100%; padding: 8px 12px; border: 1px solid #d0d0d0;
            border-radius: 4px; font-size: 14px; outline: none; transition: border 0.15s;
            font-family: inherit;
        }
        .form-input:focus, .form-select:focus { border-color: var(--color-nav); }
        .form-select { background: #fff; cursor: pointer; }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed #ccc; border-radius: 6px; padding: 28px 20px;
            text-align: center; cursor: pointer; transition: all 0.15s; background: #fafafa;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--color-nav); background: #eef3fa;
        }
        .upload-zone p { margin: 6px 0; color: #666; font-size: 14px; }
        .upload-file-info {
            display: flex; align-items: center; gap: 8px; margin-top: 10px;
            padding: 10px 12px; background: #f5f5f5; border-radius: 4px;
        }
        .upload-file-info span:first-child { flex: 1; font-size: 13px; color: #333; }
        .upload-clear-btn {
            width: 22px; height: 22px; border-radius: 50%; background: #ddd;
            color: #666; font-size: 14px; line-height: 1; border: none; cursor: pointer;
        }
        .upload-clear-btn:hover { background: #ccc; color: #333; }

        /* 文件管理表格 */
        .manage-filter {
            display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap;
        }
        .manage-filter label { font-size: 13px; color: #555; white-space: nowrap; }
        .manage-filter .form-select { width: auto; min-width: 130px; }
        .manage-list-wrap {
            max-height: 50vh; overflow-y: auto; border: 1px solid #eee; border-radius: 4px;
        }
        .manage-table {
            width: 100%; border-collapse: collapse; font-size: 13px;
        }
        .manage-table th {
            background: #f5f5f5; padding: 9px 12px; text-align: left;
            font-weight: 600; color: #555; border-bottom: 1px solid #ddd;
            position: sticky; top: 0; z-index: 1;
        }
        .manage-table td {
            padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #333;
        }
        .manage-table tr:hover td { background: #f9f9f9; }
        .manage-table .cat-tag {
            display: inline-block; padding: 1px 8px; border-radius: 3px;
            font-size: 11px; background: #eef3fa; color: var(--color-nav);
        }
        .manage-op-btn {
            padding: 3px 10px; font-size: 12px; border-radius: 3px;
            background: #fff; border: 1px solid #ddd; color: #555; cursor: pointer; margin-right: 4px;
        }
        .manage-op-btn:hover { background: #f5f5f5; }
        .manage-op-btn.danger { color: #c62828; border-color: #ffcdd2; }
        .manage-op-btn.danger:hover { background: #ffebee; }
        .manage-op-btn.primary { color: #fff; background: var(--color-nav); border-color: var(--color-nav); }
        .manage-op-btn.primary:hover { background: var(--color-nav-hover); }
        .manage-empty {
            text-align: center; padding: 40px 20px; color: #999; font-size: 14px;
        }

        /* Toast */
        .toast-container {
            position: fixed; top: 80px; right: 24px; z-index: 2000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: #fff; border-radius: 6px; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            padding: 11px 18px; font-size: 14px; min-width: 220px; max-width: 360px;

        .toast.fade-out { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

<!-- mammoth.js：Word 文档(.docx)在线预览引擎 -->
<script src="mammoth.browser.min.js"></script>

<script>'use strict';

// ========== 动态分类（从服务器 wenjianziliao 子文件夹读取）==========
const CATEGORIES = {};       // { application: { name:'申请书', files:[] }, ... }
let currentCategory = 'application';
let PAGES = [];
const TOTAL = function () { return PAGES.length; };
let currentPage = 1;
let pageSwitching = false;
let lastWheelTime = 0;
const $id = (sel) => document.getElementById(sel);

// ========== 初始化：fetch 服务器文件夹列表，生成导航 ==========
var _initRan = false;
async function _init() {
    if (_initRan) return;
    _initRan = true;

    // 1. fetch wenjianziliao/ 目录，解析子文件夹名
    try {
        var resp = await fetch('wenjianziliao/');
        if (!resp.ok) throw new Error('目录不可读');
        var text = await resp.text();
        // 从 Nginx autoindex HTML 中提取子目录名（<a href="xxx/">）
        var dirs = [];
        var re = /<a href="([^"]+)\/">/g;
        var m;
        while ((m = re.exec(text)) !== null) {
            var name = decodeURIComponent(m[1]).replace(/\/$/, '');
            if (name && name !== '.' && name !== '..') dirs.push(name);
        }
        if (dirs.length === 0) {
            // 回退到手写的默认类别
            dirs = ['申请书', '总结报告', '应用效果', '支撑材料'];
        }
        // 构建 CATEGORIES，用拼音做 key
        var defaultKeys = ['application', 'report', 'effect', 'material'];
        dirs.forEach(function (d, i) {
            var key = defaultKeys[i] || ('cat' + i);
            var displayName = d.replace(/[/\\]/g, '').trim();
            CATEGORIES[key] = { name: displayName, files: [], key: key };
        });
    } catch (e) {
        console.warn('无法读取目录，使用默认类别:', e);
        CATEGORIES.application = { name: '申请书', files: [], key: 'application' };
        CATEGORIES.report = { name: '总结报告', files: [], key: 'report' };
        CATEGORIES.effect = { name: '应用效果', files: [], key: 'effect' };
        CATEGORIES.material = { name: '支撑材料', files: [], key: 'material' };
    }

    // 2. 动态生成导航栏和侧边栏
    renderNav();
    currentCategory = Object.keys(CATEGORIES)[0] || 'application';
    bindEvents();
    // 3. 加载第一个类别的文件列表
    switchCategory(currentCategory, { init: true });
}
function renderNav() {
    var navInner = document.querySelector('.nav-inner');
    var sidebarMenu = document.querySelector('.sidebar-menu');
    navInner.innerHTML = '';
    sidebarMenu.innerHTML = '';
    var keys = Object.keys(CATEGORIES);
    keys.forEach(function (catKey, i) {
        var cat = CATEGORIES[catKey];
        // 导航栏按钮
        var navBtn = document.createElement('a');
        navBtn.className = 'nav-item' + (i === 0 ? ' active' : '');
        navBtn.dataset.cat = catKey;
        navBtn.textContent = cat.name;
        navInner.appendChild(navBtn);
        // 侧边栏按钮
        var sideBtn = document.createElement('a');
        sideBtn.className = 'sidebar-item' + (i === 0 ? ' active' : '');
        sideBtn.dataset.cat = catKey;
        sideBtn.textContent = cat.name;
        sidebarMenu.appendChild(sideBtn);
    });
}

// ========== 切换分类：fetch 对应子文件夹的文件列表 ==========
async function switchCategory(cat, options) {
    options = options || {};
    if (!CATEGORIES[cat]) return;
    currentCategory = cat;
    currentPage = 1;

    // 同步导航/侧边栏 active
    document.querySelectorAll('.nav-item').forEach(function (n) {
        n.classList.toggle('active', n.dataset.cat === cat);
    });
    document.querySelectorAll('.sidebar-item').forEach(function (s) {
        s.classList.toggle('active', s.dataset.cat === cat);
    });

    var catDir = encodeURIComponent(CATEGORIES[cat].name);
    var url = 'wenjianziliao/' + catDir + '/';

    try {
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('404');
        var text = await resp.text();
        // 解析文件列表（.docx, .doc, .pdf）
        var files = [];
        var re = /<a href="([^"]+)">/g;
        var m;
        while ((m = re.exec(text)) !== null) {
            var fname = decodeURIComponent(m[1]);
            var ext = (fname.split('.').pop() || '').toLowerCase();
            if (['docx', 'doc', 'pdf'].indexOf(ext) >= 0) {
                files.push({ name: fname, url: url + encodeURIComponent(fname), ext: ext });
            }
        }
        CATEGORIES[cat].files = files;

        if (files.length > 0) {
            // 有文件：显示文件标签页 + 渲染第一个
            PAGES = [{ num: 1, type: 'fileTabs', cat: cat }];
            renderPage(1, 'next', true);
        } else {
            // 无文件
            PAGES = [{ num: 1, type: 'noFiles', cat: cat }];
            renderPage(1, 'next', true);
        }
    } catch (e) {
        console.error('加载文件列表失败:', cat, e);
        PAGES = [{ num: 1, type: 'noFiles', cat: cat }];
        renderPage(1, 'next', true);
    }
}

// ========== 页面内容模板 ==========
function getPageHTML(page) {
    if (page.type === 'fileTabs') return renderFileTabsPage(page);
    if (page.type === 'noFiles') return '<div style="text-align:center;padding:60px;color:#999;">该类别暂无文件，请在服务器上添加 .docx 文件</div>';
    if (page.type === 'docxRender') return renderDocxRenderPage(page);
    if (page.type === 'pdfRender') return renderPdfRenderPage(page);
    return '<div style="text-align:center;padding:40px;">未知页面类型</div>';
}

// ========== 文件标签页渲染 ==========
var _activeFileIdx = {}; // {catKey: currentFileIndex}
function renderFileTabsPage(page) {
    var cat = CATEGORIES[page.cat];
    var files = cat.files;
    if (!files || files.length === 0) return '<div style="padding:40px;text-align:center;">暂无文件</div>';

    var idx = _activeFileIdx[page.cat] || 0;
    if (idx >= files.length) idx = 0;
    var activeFile = files[idx];

    // 标签栏
    var html = '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:10px 14px;'
        + 'background:#f5f5f5;border-bottom:2px solid #ddd;align-items:center;">'
        + '<span style="font-size:13px;color:#888;margin-right:8px;white-space:nowrap;">' + cat.name + '：</span>';
    files.forEach(function (f, i) {
        var active = i === idx;
        html += '<button onclick="selectFile(\'' + page.cat + '\',' + i + ')" '
            + 'style="padding:6px 18px;border-radius:4px 4px 0 0;border:1px solid ' + (active ? '#2859a3' : '#ddd') + ';'
            + 'background:' + (active ? '#2859a3' : '#fff') + ';color:' + (active ? '#fff' : '#555') + ';'
            + 'cursor:pointer;font-size:13px;white-space:nowrap;transition:all 0.15s;">'
            + escapeHtml(f.name.replace(/\.[^.]+$/, '')) + '</button>';
    });
    html += '</div>';

    // 文件内容区
    html += '<div id="fileContent_' + page.cat + '" style="min-height:calc(100vh - 180px);">'
        + '<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 180px);'
        + 'background:#fafafa;"><div style="font-size:36px;margin-right:12px;animation:spin 1s linear infinite;'
        + 'display:inline-block;">⚙️</div><p style="color:#555;">正在加载文档...</p></div></div>';

    // 异步渲染文件
    setTimeout(function () {
        renderServerFile(activeFile, 'fileContent_' + page.cat, activeFile.ext);
    }, 50);

    return html;
}

// 切换文件标签
window.selectFile = function (catKey, idx) {
    var cat = CATEGORIES[catKey];
    if (!cat || !cat.files || idx >= cat.files.length) return;
    _activeFileIdx[catKey] = idx;
    PAGES = [{ num: 1, type: 'fileTabs', cat: catKey }];
    currentPage = 1;
    renderPage(1, 'next', true);
};

// ========== 从服务器 fetch 文件并渲染 ==========
function renderServerFile(file, containerId, ext) {
    var container = document.getElementById(containerId);
    if (!container) return;

    var isDocx = ext === 'docx';
    var isDoc = ext === 'doc';
    var isPdf = ext === 'pdf';

    fetch(file.url)
        .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.arrayBuffer();
        })
        .then(function (ab) {
            if (isDocx && typeof mammoth !== 'undefined') {
                // .docx → mammoth.js
                mammoth.convertToHtml({ arrayBuffer: ab }, {
                    includeDefaultStyleMap: true,
                    styleMap: [
                        "p[style-name='Heading 1'] => h1.secheading:fresh",
                        "p[style-name='Heading 2'] => h2.secheading:fresh",
                        "p[style-name='Heading 3'] => h3.secheading:fresh",
                        "p[style-name='Heading 4'] => h4.secheading:fresh",
                        "p[style-name='Title'] => h1.doctitle:fresh",
                        "p[style-name='Normal'] => p.docpara:fresh",
                        "r[style-name='Strong'] => strong",
                        "r[style-name='Emphasis'] => em"
                    ]
                }).then(function (result) {
                    if (result.value.trim()) {
                        container.innerHTML = '<div style="background:#f5f5f5;padding:20px 0;">'
                            + '<div style="background:#fff;padding:48px 56px;'
                            + 'box-shadow:0 1px 6px rgba(0,0,0,0.1);line-height:1.85;'
                            + 'font-family:"Microsoft YaHei","SimSun",serif;font-size:14px;color:#222;">'
                            + result.value + '</div></div>';
                    } else {
                        container.innerHTML = '<div style="text-align:center;padding:60px;color:#999;">文档内容为空</div>';
                    }
                }).catch(function () {
                    container.innerHTML = '<div style="text-align:center;padding:60px;color:#999;">文档解析失败</div>';
                });
            } else if (isDocx) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:#999;">文档预览组件未加载，请刷新页面重试</div>';
            } else if (isDoc) {
                // .doc → 文本提取
                var u8 = new Uint8Array(ab);
                var text = extractDocTextSimple(u8);
                if (text && (text.match(/[\u4E00-\u9FFF]/g) || []).length >= 50) {
                    container.innerHTML = '<div style="background:#f5f5f5;padding:20px 0;">'
                        + '<div style="background:#fff;padding:40px 48px;'
                        + 'font-family:SimSun,serif;font-size:14.5px;color:#222;'
                        + 'white-space:pre-wrap;line-height:2;">'
                        + escapeHtml(text) + '</div></div>';
                } else {
                    container.innerHTML = '<div style="text-align:center;padding:60px;">'
                        + '<h2 style="color:#333;">无法在线预览 .doc 文件</h2>'
                        + '<p style="color:#999;margin:12px 0;">请用 WPS 打开后另存为 .docx 格式再放入文件夹</p>'
                        + '<a href="' + file.url + '" download style="padding:10px 28px;'
                        + 'background:#2859a3;color:#fff;border-radius:4px;text-decoration:none;display:inline-block;">⬇ 下载源文件</a></div>';
                }
            } else if (isPdf) {
                // PDF → blob URL → iframe
                var blob = new Blob([ab], { type: 'application/pdf' });
                var blobUrl = URL.createObjectURL(blob);
                container.innerHTML = '<iframe src="' + blobUrl + '" style="width:100%;'
                    + 'height:calc(100vh - 160px);border:none;display:block;"></iframe>';
            } else {
                container.innerHTML = '<div style="text-align:center;padding:60px;">不支持的文件类型：' + ext + '</div>';
            }
        })
        .catch(function (e) {
            container.innerHTML = '<div style="text-align:center;padding:60px;color:#c62828;">'
                + '文件加载失败: ' + escapeHtml(e.message) + '</div>';
        });
}

// ========== 页面渲染 ==========
function renderPage(pageNum, direction, force) {
    var total = TOTAL();
    if (pageNum < 1 || pageNum > total) return;
    if (!force && pageNum === currentPage && direction === undefined) return;

    pageSwitching = true;
    currentPage = pageNum;
    updateToolbar();
    renderPagination();

    var pageData = PAGES[pageNum - 1];
    var wrap = $id('docScrollWrap');
    var page = $id('docPage');

    // 重置 docPage 样式
    page.style.padding = '0';
    page.style.margin = '0';
    page.style.minHeight = '0';
    page.style.maxWidth = 'none';
    page.style.boxShadow = 'none';
    page.style.background = 'transparent';

    if (force) {
        $id('docContent').innerHTML = getPageHTML(pageData);
        wrap.scrollTop = 0;
        pageSwitching = false;
    } else {
        page.style.opacity = '0';
        page.style.transform = direction === 'prev' ? 'translateY(-12px)' : 'translateY(12px)';
        setTimeout(function () {
            $id('docContent').innerHTML = getPageHTML(pageData);
            if (direction === 'prev') { wrap.scrollTop = wrap.scrollHeight; }
            else { wrap.scrollTop = 0; }
            page.style.opacity = '1';
            page.style.transform = 'translateY(0)';
            setTimeout(function () { pageSwitching = false; }, 350);
        }, 120);
    }
}

function updateToolbar() {
    var total = TOTAL();
    $id('pageInfo').textContent = total <= 1 ? '' : (currentPage + ' / ' + total);
    $id('btnPrev').disabled = currentPage <= 1;
    $id('btnNext').disabled = currentPage >= total;
}
function renderPagination() {
    var bar = $id('paginationBar');
    var total = TOTAL();
    if (total <= 1) { bar.innerHTML = ''; return; }
    var html = '<button class="page-btn"' + (currentPage <= 1 ? ' disabled' : '') + ' data-p="' + (currentPage - 1) + '">‹ 上一页</button>';
    var pages = [];
    if (total <= 9) { for (var i = 1; i <= total; i++) pages.push(i); }
    else {
        pages.push(1);
        if (currentPage > 4) pages.push(0);
        for (var s = Math.max(2, currentPage - 1); s <= Math.min(total - 1, currentPage + 1); s++) pages.push(s);
        if (currentPage < total - 3) pages.push(0);
        pages.push(total);
    }
    pages.forEach(function (p) {
        if (p === 0) html += '<span style="color:#ccc;padding:0 4px;">···</span>';
        else html += '<button class="page-btn' + (p === currentPage ? ' active' : '') + '" data-p="' + p + '">' + p + '</button>';
    });
    html += '<button class="page-btn"' + (currentPage >= total ? ' disabled' : '') + ' data-p="' + (currentPage + 1) + '">下一页 ›</button>';
    html += '<span class="page-info"><span>共 ' + total + ' 页</span>';
    html += '<span class="page-jump">跳到<input type="number" min="1" max="' + total + '" id="jumpInput">页</span></span>';
    bar.innerHTML = html;
}

// .doc 文本提取（简化版，按 UTF-16LE 扫描）
function extractDocTextSimple(u8) {
    var text = '';
    for (var i = 0; i < u8.length - 1; i += 2) {
        var code = u8[i] | (u8[i + 1] << 8);
        if (code >= 0x20 && code < 0x7F || code >= 0x2000 && code < 0xFFFF && code !== 0xFFFD) {
            text += String.fromCharCode(code);
        }
    }
    return text.replace(/[\x00-\x1F]+/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
}

function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

// ========== Toast 消息 ==========
function showToast(msg, type) {
    var tc = $id('toastContainer');
    var el = document.createElement('div');
    el.className = 'toast toast-' + (type || 'info');
    el.textContent = msg;
    tc.appendChild(el);
    setTimeout(function () { el.classList.add('fade-out'); }, 2500);
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 2800);
}

// ========== 事件绑定 ==========
function bindEvents() {
    document.querySelectorAll('.nav-item').forEach(function (item) {
        item.addEventListener('click', function () {
            var cat = this.dataset.cat;
            if (cat && cat !== currentCategory) switchCategory(cat);
        });
    });
    document.querySelectorAll('.sidebar-item').forEach(function (item) {
        item.addEventListener('click', function () {
            var cat = this.dataset.cat;
            if (cat && cat !== currentCategory) switchCategory(cat);
        });
    });
    $id('btnPrev').addEventListener('click', function () { if (currentPage > 1) renderPage(currentPage - 1, 'prev'); });
    $id('btnNext').addEventListener('click', function () { if (currentPage < TOTAL()) renderPage(currentPage + 1, 'next'); });
    $id('btnDownload').addEventListener('click', function () { alert('下载功能：将导出当前文档为 PDF 格式（演示模式）'); });

    $id('paginationBar').addEventListener('click', function (e) {
        var btn = e.target.closest('[data-p]');
        if (btn && !btn.disabled) {
            var target = parseInt(btn.dataset.p);
            renderPage(target, target > currentPage ? 'next' : 'prev');
        }
    });
    $id('paginationBar').addEventListener('keydown', function (e) {
        if (e.target.id === 'jumpInput' && e.key === 'Enter') {
            var val = parseInt(e.target.value);
            if (val >= 1 && val <= TOTAL()) renderPage(val, val > currentPage ? 'next' : 'prev');
            else e.target.value = '';
        }
    });

    // 滚轮翻页
    var wrap = $id('docScrollWrap');
    wrap.addEventListener('wheel', function (e) {
        var now = Date.now();
        if (pageSwitching || TOTAL() <= 1 || now - lastWheelTime < 80) return;
        var atBottom = wrap.scrollTop + wrap.clientHeight >= wrap.scrollHeight - 2;
        var atTop = wrap.scrollTop <= 2;
        if (e.deltaY > 0 && atBottom) {
            e.preventDefault();
            if (currentPage < TOTAL()) { lastWheelTime = now; renderPage(currentPage + 1, 'next'); }
        } else if (e.deltaY < 0 && atTop) {
            e.preventDefault();
            if (currentPage > 1) { lastWheelTime = now; renderPage(currentPage - 1, 'prev'); }
        }
    }, { passive: false });

    // 键盘翻页
    $id('docScrollWrap').setAttribute('tabindex', '0');
    $id('docScrollWrap').addEventListener('keydown', function (e) {
        if (TOTAL() <= 1) return;
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
            e.preventDefault();
            if (currentPage > 1) renderPage(currentPage - 1, 'prev');
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') {
            e.preventDefault();
            if (currentPage < TOTAL()) renderPage(currentPage + 1, 'next');
        }
    });
}

// ========== 启动 ==========
_init();
</script>
